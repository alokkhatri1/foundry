name: Deploy Supabase Edge Functions

# Mirrors the Vercel-on-push pattern used for the React app. Vercel handles
# the frontend; this workflow handles anything under supabase/functions/.
# Triggers only when a function actually changes, so unrelated frontend
# pushes don't burn CI minutes deploying functions that haven't moved.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ryzmzjiilqgtbiqmpbfv
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy claude-proxy
        run: supabase functions deploy claude-proxy --project-ref "$PROJECT_REF"
